seed: 0

application:
  name: dna_discovery
  entrypoint: applications.dna_discovery.env:MaskedDNADiscoveryEnv
  visualizer: applications.dna_discovery.visualize:DNADiscoveryVisualizer

agent:
  name: q_learning
  gamma: 0.99
  learning_rate: 0.1
  epsilon:
    type: linear
    start: 1.0
    end: 0.05
    decay_steps: 50000

training:
  total_steps: 50000
  eval_interval: 2000
  eval_episodes: 20
  log_interval: 1000
  save_interval: 50000
  progress_bar: true

visualization:
  enabled: true
  interval: 10000
  episodes: 1
  format: gif
  fps: 2
  max_steps: 15

logging:
  output_root: outputs
  run_name: dna_qlearning_seed0
  save_csv: true
