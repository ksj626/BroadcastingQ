seed: 0

application:
  name: lights_out
  entrypoint: applications.lights_out.env:LightsOutEnv
  visualizer: applications.lights_out.visualize:LightsOutVisualizer

env:
  rows: 4
  cols: 4
  start_mode: solvable_scramble
  scramble_steps: 16
  action_slip_prob: 0.05
  avoid_solved_start: true
  max_steps: 70

agent:
  name: q_learning
  gamma: 0.99
  learning_rate: 0.2
  epsilon:
    type: linear
    start: 1.0
    end: 0.05
    decay_steps: 80000

training:
  total_steps: 250000
  eval_interval: 10000
  eval_episodes: 20
  eval_max_steps: 70
  log_interval: 1000
  save_interval: 50000
  progress_bar: true

visualization:
  enabled: true
  interval: 10000
  episodes: 1
  format: gif
  fps: 4
  max_steps: 70

logging:
  output_root: outputs
  run_name: lights_out_4x4_qlearning_seed0
  save_csv: true
