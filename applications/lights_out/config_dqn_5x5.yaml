seed: 0

application:
  name: lights_out
  entrypoint: applications.lights_out.env:LightsOutEnv
  visualizer: applications.lights_out.visualize:LightsOutVisualizer

env:
  rows: 5
  cols: 5
  start_mode: solvable_scramble
  scramble_steps: 25
  action_slip_prob: 0.05
  avoid_solved_start: true
  max_steps: 100

agent:
  name: dqn
  device: auto
  gamma: 0.99
  learning_rate: 0.0005
  batch_size: 128
  replay_size: 100000
  warmup_steps: 2000
  target_update_interval: 1000
  hidden_sizes: [256, 256]
  epsilon:
    type: linear
    start: 1.0
    end: 0.05
    decay_steps: 1000000

training:
  total_steps: 2000000
  eval_interval: 50000
  eval_episodes: 50
  eval_seed: 200000
  eval_max_steps: 100
  log_interval: 5000
  save_interval: 250000
  progress_bar: true

visualization:
  enabled: true
  interval: 50000
  episodes: 1
  format: gif
  fps: 4
  max_steps: 100

logging:
  output_root: outputs
  run_name: lights_out_5x5_dqn_seed0
  save_csv: true
